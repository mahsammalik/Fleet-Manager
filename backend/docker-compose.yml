version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: fleetmanager-db
    environment:
      POSTGRES_DB: fleetmanager
      POSTGRES_USER: fleetadmin
      POSTGRES_PASSWORD: FleetPass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata: